version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: spark-ln-address-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: spark_ln_address
      MYSQL_USER: spark_user
      MYSQL_PASSWORD: spark_password
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

  mysql-test:
    image: mysql:8.0
    container_name: spark-ln-address-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: spark_ln_address_test
      MYSQL_USER: spark_user
      MYSQL_PASSWORD: spark_password
    ports:
      - "3309:3306"
    volumes:
      - mysql_test_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password
    profiles:
      - test

volumes:
  mysql_data:
  mysql_test_data:
